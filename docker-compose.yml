# تشغيل الـ UTD Base Project + قاعدة بياناته بأمر واحد.
#
# الـ chat package (chatPackageV2) بيتـ mount جوه الكونتينر على المسار اللي الـ
# composer path repo بيتوقّعه: من /app المسار ../../chatPackageV2/backend = /chatPackageV2/backend.
# شغّل من مجلد utd-base-project:   docker compose up --build
services:
  app:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: build_your_app
      DB_USERNAME: utd
      DB_PASSWORD: secret
    volumes:
      # الـ chat package (path repo target) — لازم يطابق ../../chatPackageV2/backend من /app
      - ../chatPackageV2/backend:/chatPackageV2/backend
      # كاش الـ vendor عشان مانعملش composer install كل مرة
      - vendor:/app/vendor
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: build_your_app
      MYSQL_USER: utd
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  vendor:
  dbdata:
