name: Deploy to project-x

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

concurrency:
  group: deploy-project-x
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Backend
    runs-on: [self-hosted, project-x]
    defaults:
      run:
        working-directory: /var/www/project-x/backend

    steps:
      - name: Reclaim file ownership
        working-directory: /var/www/project-x
        run: |
          sudo chown -R github-runner:www-data /var/www/project-x/backend/storage /var/www/project-x/backend/bootstrap/cache

      - name: Pull latest code
        working-directory: /var/www/project-x
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Install dependencies
        run: composer install --no-interaction --optimize-autoloader --no-dev

      - name: Run migrations
        run: php artisan migrate --force

      - name: Optimize
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan filament:assets 2>/dev/null || true

      - name: Restart queue workers
        # Signals running queue:work processes (supervisor-managed) to restart so
        # they pick up the new code. No-op if no worker is running. See
        # deploy/README.md for the supervisor + scheduler-cron server setup.
        run: php artisan queue:restart

      - name: Fix permissions
        run: |
          sudo chown -R www-data:www-data /var/www/project-x/backend/storage /var/www/project-x/backend/bootstrap/cache
          sudo chmod -R 775 /var/www/project-x/backend/storage /var/www/project-x/backend/bootstrap/cache

      - name: Reload services
        run: |
          sudo service php8.2-fpm reload
          sudo service nginx reload

      - name: Health check
        # Warn-only: the app now exposes a DB-aware /api/health (200 when healthy,
        # 503 when the DB is down). To turn this into a hard gate, point curl at
        # the URL that reaches Laravel on this host (the public localhost vhost
        # returns 404 for /api/health) and exit 1 on non-200.
        run: |
          sleep 3
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost || echo "000")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -ge 500 ] || [ "$STATUS" = "000" ]; then
            echo "::warning::Health check returned $STATUS"
          fi
          echo "Deploy complete"
