name: CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, intl, pdo_sqlite, sqlite3, gd, zip, exif, fileinfo
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare test env
        # Tests run against in-memory sqlite (see phpunit.xml); only APP_KEY is needed.
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Package test suite
        run: vendor/bin/phpunit --testsuite=Packages

      - name: Code style (Pint, informational)
        run: vendor/bin/pint --test
        continue-on-error: true
