name: gifts
description: "Gifts feature package for the UTD add-on platform (catalog + send picker + history)."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Core app contract (AppFeature, networking, config, GiftBridge)
  utd_app:
    path: ../../

  go_router: ^13.0.0
  dio: ^5.4.0
  provider: ^6.0.0
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.8
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
