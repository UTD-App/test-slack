name: moment
description: "Moment feature package for the UTD add-on platform (feed, likes, comments, reports)."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Core app contract (AppFeature, networking, config, cache)
  utd_app:
    path: ../../base-project/flutter

  go_router: ^13.0.0
  dio: ^5.4.0
  provider: ^6.0.0
  # On-disk media cache (images download once, survive scroll/refresh, work
  # offline) + Hive box for the cache-first feed (instant/offline first paint).
  cached_network_image: ^3.3.1
  hive_flutter: ^1.1.0
  # Full-screen image gallery (pinch-zoom + swipe between a moment's images).
  photo_view: ^0.15.0
  # Server-Driven UI: this package contributes Stac action parsers + data sources.
  stac: ^1.5.0
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.8
  flutter_screenutil: ^5.9.3
  image_picker: ^1.0.7
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
