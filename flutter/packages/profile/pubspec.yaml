name: profile
description: Extensible user profile viewing package — container for profile sections contributed by other packages.
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.9.2
  flutter: ">=3.29.2"

dependencies:
  flutter:
    sdk: flutter
  utd_app:
    path: ../../
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.8
  provider: ^6.0.0
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.3.1
  go_router: ^13.0.0

dependency_overrides:
  archive: ^4.0.0
  http: ^1.0.0
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
