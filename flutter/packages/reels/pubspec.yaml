name: reels
description: "Reels feature package for the UTD add-on platform (short-video feed, likes, comments, views, reports)."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Core app contract (AppFeature, networking, config, cache)
  utd_app:
    path: ../../

  go_router: ^13.0.0
  dio: ^5.4.0
  provider: ^6.0.0
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.8
  flutter_screenutil: ^5.9.3
  image_picker: ^1.0.7
  video_player: ^2.8.0
  # Routes reel audio through the media/playback session so video plays WITH
  # sound even when the device silent/ringer switch is on (iOS). Without it,
  # video_player uses the default ambient category and every reel is muted.
  audio_session: ^0.2.0
  visibility_detector: ^0.4.0+2
  share_plus: ^10.0.0
  flutter_cache_manager: ^3.3.0
  # Disk-cached, decode-throttled network images for the feed poster + author
  # avatars — avoids re-downloading/re-decoding (flicker + jank) on scroll-back.
  cached_network_image: ^3.3.0
  # On-device poster generation for the My-Reels grid: extracts a frame from the
  # video when the server FFmpeg poster (sub_frame) is absent, so tiles show a
  # real thumbnail instead of a black rectangle. 0.5.6 carries the AGP-8 namespace fix.
  video_thumbnail: ^0.5.6
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
