name: utd_app
description: "Platform for paid add-ons sold as source code."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  shared_preferences: ^2.2.0
  hive_flutter: ^1.1.0
  go_router: ^13.0.0
  provider: ^6.0.0
  dio: ^5.4.0
  connectivity_plus: ^6.0.0
  equatable: ^2.0.8
  flutter_screenutil: ^5.9.3
  fluttertoast: ^8.2.4
  loading_animation_widget: ^1.3.0
  flutter_svg: ^2.0.9
  flutter_svga: ^0.0.13
  stac: ^1.5.0
  flutter_cache_manager: ^3.3.0
  path_provider: ^2.1.0
  lottie: ^3.3.3
  firebase_core: ^3.8.1
  firebase_messaging: ^15.2.1
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  utd_audio_room_kit: ^1.3.0

  authentication:
    path: packages/authentication
  profile:
    path: packages/profile
  moment:
    path: packages/moment
  audio_room:
    path: packages/audio-room/flutter
  audio_room_charisma:
    path: packages/audio-room/plugins/charisma/flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

dependency_overrides:
  archive: ^4.0.0
  http: ^1.0.0
  connectivity_plus: ^6.0.0
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  
flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
