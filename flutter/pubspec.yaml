name: utd_app
description: "Platform for paid add-ons sold as source code."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  shared_preferences: ^2.2.0
  hive_flutter: ^1.1.0
  go_router: ^13.0.0
  provider: ^6.0.0
  dio: ^5.4.0
  connectivity_plus: ^6.0.0
  equatable: ^2.0.8
  flutter_screenutil: ^5.9.3
  fluttertoast: ^8.2.4
  loading_animation_widget: ^1.3.0
  flutter_svg: ^2.0.9
  flutter_svga: ^0.0.13
  # UTD Studio — the SDUI runtime (vendored fork of stac). Replaces the direct
  # `stac` dependency; import only `package:utd_studio_sdk/utd_studio_sdk.dart`.
  utd_studio_sdk:
    path: packages/utd_studio_sdk
  google_fonts: ^6.2.1
  flutter_cache_manager: ^3.3.0
  path_provider: ^2.1.0
  lottie: ^3.3.3
  firebase_core: ^3.8.1
  firebase_messaging: ^15.2.1
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.5
  flutter_local_notifications: ^18.0.1
  permission_handler: ^12.0.1 # base uses ^11.3.1, but utd_audio_room_kit needs ^12
  flutter_image_compress: ^2.3.0
  webview_flutter: ^4.14.0
  authentication:
    path: packages/authentication
  profile:
    path: packages/profile
  moment:
    path: packages/moment
  audio_room:
    path: packages/audio-room/flutter
  audio_room_charisma:
    path: packages/audio-room/plugins/charisma/flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

dependency_overrides:
  archive: ^4.0.0
  http: ^1.0.0
  connectivity_plus: ^6.0.0
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  # Vendored stac fork lives inside utd_studio_sdk. pub honours overrides ONLY
  # from the entrypoint (this) pubspec — see packages/utd_studio_sdk/UPSTREAM.md.
  stac:
    path: packages/utd_studio_sdk/vendor/stac
  stac_core:
    path: packages/utd_studio_sdk/vendor/stac_core
  stac_framework:
    path: packages/utd_studio_sdk/vendor/stac_framework
  stac_logger:
    path: packages/utd_studio_sdk/vendor/stac_logger

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
